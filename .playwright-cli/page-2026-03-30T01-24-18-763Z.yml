          - generic [ref=e251]: "Command: /bin/bash -lc \"sed -n '1,240p' /home/nlyu/Code/diffusive-latent-generation/metastudies/multimodal-gaussian-2d-retry/plan.md\" Chunk ID: d8235c Wall time: 0.0000 seconds Process exited with code 0 Original token count: 1757 Output: # Multimodal Gaussian 2D Retry Plan ## Strategy This retry is organized around the main weakness of the earlier 2D attempt: it treated scalar metrics too generously and did not enforce a strict visual standard. The new plan therefore starts with a dedicated comparator study so the project has an explicit reference for what good `2D` multimodal Gaussian samples and reasonable projected KL values look like before chart transport is tuned at all. Every later study inherits the same review rule: inspect the generated-sample artifacts from the last few checkpoints, judge separation, smoothness, overlap, and stability, and only then interpret KL and loss curves. The study order then follows the theoretical and practical bottlenecks in `theory/proposal.typ`. Chart transport depends on a sufficiently good critic and on a stable coupling between critic cadence and latent transport step size, cap, and minimum noise time, so the first chart-transport work stays on the easiest `2`-mode problem. Only after runtime-sensitive and transport-sensitive knobs are narrowed down does the plan ask whether model capacity and prior symmetry breaking are helping or merely adding cost. That keeps the structural ablation from being confounded by obviously unstable transport dynamics. The final two studies convert the stabilized `2`-mode protocol into the actual deliverable. First, the best `2`-mode protocol is held fixed while the number of modes increases, which cleanly reveals where scaling breaks without masking the answer through constant retuning. Then one narrow `8`-mode retune uses only the knobs implicated by that scaling study to produce a final recommended protocol and a direct verdict on the under-`10`-minute, preferably under-`5`-minute, goal. Prior findings from the earlier `multimodal-gaussian-2d` metastudy are treated as planning input only: they help avoid obviously weak directions, but fresh evidence in this retry is what counts. ## Studies ### 1. flow-matching-comparators **Research question**: What sample quality, projected KL, and runtime are achievable on the `2D` multimodal Gaussian task with simple flow-matching comparators, and what should chart transport have to beat? **Rationale**: This must come first because the retry objective explicitly requires a dedicated comparator study, and because later chart-transport studies need a concrete visual and numerical reference rather than an abstract notion of \"good enough.\" **Expected output**: Comparator tables for `2`-mode and `8`-mode settings, representative late-checkpoint sample figures, and a recommended target range for visual quality, KL, and runtime. ### 2. 2-mode-chart-transport-visual-baseline **Research question**: How far does the current chart-transport workflow already get on `2` modes under strict visual review, projected KL, and runtime? **Rationale**: This establishes the fresh chart-transport baseline that all later ablations must beat. It also separates one-shot training from integrated-only continuation so the project can distinguish runtime cost from integrated instability. **Expected output**: Seed-level baseline results, late-checkpoint sample figures, stage-level runtime measurements, and a diagnosis of the main canonical failure mode. ### 3. 2-mode-runtime-and-transport-budget **Research question**: Which warm-start budget and transport-update settings give the best speed-versus-stability tradeoff for visually acceptable `2`-mode chart transport? **Rationale**: Theory identifies critic quality and transport-step coupling as the most likely practical failure points. This study comes before structural ablations so capacity and prior choices are not blamed for dynamics that are actually caused by poor transport settings. **Expected output**: A compact ablation over pretrain reuse, critic cadence, step size, cap, and minimum `t`, plus one recommended runtime / transport regime. ### 4. 2-mode-capacity-and-prior **Research question**: What smallest model-capacity and prior setting still yields robust, visually clean `2`-mode chart transport under the preferred transport regime? **Rationale**: Once transport dynamics are reasonably stable, this study determines whether the canonical model size and anchored-prior sharpness are necessary or whether a simpler, cheaper structure is sufficient. **Expected output**: One preferred structural configuration for later scaling work, or a finding that the canonical structure is still needed. ### 5. mode-scaling-fixed-protocol **Research question**: How does chart-transport difficulty change as mode count increases when the best `2`-mode protocol is held fixed? **Rationale**: The objective explicitly asks to increase the number of modes and analyze how difficulty changes. Holding the protocol fixed isolates intrinsic scaling failure from the effects of repeated retuning. **Expected output**: A scaling table or curve over `2`, `4`, `6`, and `8` modes, the first mode count where reliability breaks, and the diagnostics that best predict that breakdown. ### 6. 8-mode-final-retune **Research question**: Can a narrowly retuned chart-transport protocol achieve reliable, visually clean `8`-mode generation within the target runtime budget? **Rationale**: This is the final delivery study. It uses only the knobs implicated by the scaling study so the end result is a deliberate protocol recommendation rather than another open-ended sweep. **Expected output**: A named final protocol, `8`-mode late-checkpoint sample figures, KL summaries, runtime measurements, and a clear success or failure verdict against the metastudy objective. ## Success Criteria The metastudy succeeds if it delivers a chart-transport protocol that visually covers all `8` modes cleanly, achieves competitive projected KL, stays within the runtime target, and explains which parameters matter most for optimization behavior. - Visual quality is anchored first by `flow-matching-comparators`, then enforced for chart transport in `2-mode-chart-transport-visual-baseline`, `2-mode-runtime-and-transport-budget`, and `2-mode-capacity-and-prior`, stress-tested in `mode-scaling-fixed-protocol`, and decided finally in `8-mode-final-retune`. - Numerical quality is calibrated in `flow-matching-comparators`, used to rank `2`-mode chart-transport variants in the next three studies, and used as a final acceptance metric in `8-mode-final-retune`, always subordinate to visual inspection. - Runtime is first benchmarked in `flow-matching-comparators` and `2-mode-chart-transport-visual-baseline`, then actively optimized in `2-mode-runtime-and-transport-budget`, with the final under-`10`-minute and preferably under-`5`-minute requirement judged in `8-mode-final-retune`. - Understanding what works, what breaks, and which interactions matter is the primary output of `2-mode-runtime-and-transport-budget`, `2-mode-capacity-and-prior`, and `mode-scaling-fixed-protocol`, with `8-mode-final-retune` converting that understanding into one final recommendation."
